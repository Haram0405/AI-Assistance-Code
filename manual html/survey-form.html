<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body  align = "center">
    <form style="background-color: white;">
    <h1>Survey Form</h1>
    <p class="description">
        Let us know how we can improve freeCodeCamp
    </p>
    <!-- Name Field -->
     <div class="form-group">
        <label id="name-label" for="name"> Name:</label>
        <input type="text" id="name" placeholder="Enter your name" required>
     </div>
     <br>
         <!-- Email Field -->
     <div class="form-group">
        <label id="email-label" for="email"> Email:</label>
        <input type="email" id="email " placeholder="Enter your Email" required>
     </div>
<br>
         <!-- Age Field -->
     <div class="form-group">
        <label id="age-label" for="age"> Age:</label>
        <input type="number" id="age" placeholder="Enter your Age" required>
     </div>
<br>
        <!-- Role -->
        <div>
            <label for="dropdown">Which option best describes your current role?</label>
        
            <select id="dropdown">
                <option value="student">Student</option>
                <option value="job">Full Time Job</option>
                <option value="learner">Full Time Learner</option>
                <option value="preferNo">Prefer not to say</option>
                <option value="other">Other</option>
            </select>
        </div>
<br>
                <!-- Role -->
        <div>
            <label>How likely is that you would recommend freeCodeCamp to a friend?</label>
            <label><input type="radio" name="recommend" value="definitely"> Definitely</label>
            <label><input type="radio" name="recommend" value="maybe"> Maybe</label>
            <label><input type="radio" name="recommend" value="not-sure"> Not sure</label>
        </div>
<br>
                <!-- Most Like Dropdown -->
        <div>
            <label for="most-like">What do you like most in FCC:</label>
            <select id="most-like">
                <option disabled selected value>Select an option</option>
                <option value="challenges">Challenges</option>
                <option value="projects">Projects</option>
                <option value="community">Community</option>
                <option value="openSource">Open Source</option>
            </select>
        </div>
<br>
                <!-- Checkboxes -->
<div>
            <label>Things that should be improved in the future (Check all that apply):</label>
            <br><br>
            <label><input type="checkbox" value="frontend"> Front-end Projects</label>
            <br>
            <label><input type="checkbox" value="backend"> Back-end Projects</label>
            <br>
            <label><input type="checkbox" value="visualization"> Data Visualization</label>
        </div>
    </form>
</body>
</html>
